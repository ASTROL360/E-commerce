<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fashion Store</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">FS</span>
          <div>
            <strong>Fashion Store</strong>
            <small>Commerce dashboard</small>
          </div>
        </div>

        <nav class="nav">
          <button class="nav-item active" data-view="shop" type="button">Shop</button>
          <button class="nav-item" data-view="cart" type="button">Cart <span id="cart-count">0</span></button>
          <button class="nav-item" data-view="orders" type="button">Orders</button>
          <button class="nav-item admin-only hidden" data-view="admin" type="button">Admin</button>
        </nav>

        <div class="api-panel">
          <label for="api-base">API base</label>
          <input id="api-base" type="url" value="http://localhost:8081/api" />
          <button id="save-api" class="secondary-button" type="button">Save</button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1 id="view-title">Shop</h1>
            <p id="view-subtitle">Browse products, manage cart, and checkout.</p>
          </div>
          <div class="auth-area">
            <div id="user-chip" class="user-chip hidden"></div>
            <button id="logout-button" class="secondary-button hidden" type="button">Logout</button>
            <button id="auth-button" class="primary-button" type="button">Login</button>
          </div>
        </header>

        <div id="alert" class="alert hidden"></div>

        <section id="shop-view" class="view active">
          <div class="toolbar">
            <div class="search-box">
              <input id="search-input" type="search" placeholder="Search products" />
              <button id="search-button" class="secondary-button" type="button">Search</button>
            </div>
            <select id="category-filter" aria-label="Filter by category">
              <option value="">All categories</option>
            </select>
          </div>
          <div id="product-grid" class="product-grid"></div>
          <div id="empty-products" class="empty hidden">No products yet. Login as admin and add your first item.</div>
        </section>

        <section id="cart-view" class="view">
          <div id="cart-list" class="stack"></div>
          <div class="checkout-panel">
            <div>
              <span>Total</span>
              <strong id="cart-total">NGN 0</strong>
            </div>
            <textarea id="shipping-address" placeholder="Shipping address"></textarea>
            <button id="checkout-button" class="primary-button" type="button">Checkout</button>
          </div>
        </section>

        <section id="orders-view" class="view">
          <div id="orders-list" class="stack"></div>
          <div id="empty-orders" class="empty hidden">No orders yet.</div>
        </section>

        <section id="admin-view" class="view">
          <div class="admin-layout">
            <section class="panel">
              <h2>Category</h2>
              <form id="category-form" class="form-grid">
                <input id="category-id" type="hidden" />
                <label>Name<input id="category-name" required /></label>
                <label>Slug<input id="category-slug" required /></label>
                <label>Image URL<input id="category-image" /></label>
                <button class="primary-button" type="submit">Save Category</button>
              </form>
              <div id="category-list" class="compact-list"></div>
            </section>

            <section class="panel">
              <h2>Product</h2>
              <form id="product-form" class="form-grid">
                <input id="product-id" type="hidden" />
                <label>Name<input id="product-name" required /></label>
                <label>Brand<input id="product-brand" /></label>
                <label>Base price<input id="product-price" type="number" min="1" step="0.01" required /></label>
                <label>Category<select id="product-category" required></select></label>
                <label>Cover image URL<input id="product-image" /></label>
                <label class="wide">Description<textarea id="product-description"></textarea></label>
                <div class="variant-editor wide">
                  <div class="variant-head">
                    <strong>Variants</strong>
                    <button id="add-variant" class="secondary-button" type="button">Add Variant</button>
                  </div>
                  <div id="variant-list"></div>
                </div>
                <button class="primary-button" type="submit">Save Product</button>
                <button id="reset-product" class="secondary-button" type="button">Clear</button>
              </form>
            </section>

            <section class="panel wide-panel">
              <h2>Order Management</h2>
              <div id="admin-orders" class="stack"></div>
              <div class="empty">Admin status updates appear after customers place orders.</div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <dialog id="auth-dialog" class="modal">
      <form id="auth-form" method="dialog" class="form-grid">
        <h2 id="auth-title">Login</h2>
        <label class="register-field hidden">Name<input id="auth-name" /></label>
        <label>Email<input id="auth-email" type="email" required /></label>
        <label>Password<input id="auth-password" type="password" minlength="6" required /></label>
        <div class="modal-actions">
          <button id="toggle-auth-mode" class="secondary-button" type="button">Create account</button>
          <button class="primary-button" type="submit">Continue</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
