server:
  port: 8081
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/fashionstore_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456789}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  devtools:
    restart:
      enabled: false

  jackson:
    time-zone: ${APP_TIME_ZONE:Africa/Lagos}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  admin:
    name: ${ADMIN_NAME:Store Admin}
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}
  jwt:
    # ⚠️ SECURITY: In PRODUCTION, set these via environment variables!
    # export JWT_SECRET="your-production-secret-key-min-256-bits"
    # export JWT_EXPIRATION="86400000"  
    secret: ${JWT_SECRET:your-very-long-secret-key-here-min-256-bits}
    expiration: ${JWT_EXPIRATION:86400000}
